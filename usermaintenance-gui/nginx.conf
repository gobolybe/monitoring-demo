server {
    listen 80;

    # 1. Statikus frontend fájlok kiszolgálása
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. API hívások továbbítása a backend felé (Reverse Proxy)
    location /api/ {
        # A 'backend' név a docker-compose-ban megadott service neve!
        proxy_pass http://demo-backend:8080/api/;

        # Fontos fejlécek a kérések továbbításához
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
