global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['demo-backend:8081']

  - job_name: 'nginx-frontend'
    static_configs:
      - targets: ['demo-gui:80'] # Itt az Nginx alap metrics-ét vagy magát a hostot figyeljük